name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (Actions source) on the first run.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optional: add a VITE_STADIA_API_KEY repo secret to use Stadia tiles.
          # Without it the map falls back to keyless CARTO tiles automatically.
          VITE_STADIA_API_KEY: ${{ secrets.VITE_STADIA_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
